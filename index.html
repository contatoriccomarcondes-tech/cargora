<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Cargora</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#0d1b2a;
color:white;
padding:15px;
font-size:20px;
}

.container{
width:90%;
max-width:700px;
margin:auto;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{

width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;

}

button{

background:#3b82f6;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
cursor:pointer;

}

.valor{

color:#2563eb;
font-weight:bold;
font-size:18px;

}

</style>

</head>

<body>

<header>
🚚 Cargora
</header>


<div class="container">

<div class="card">

<h2>Publicar carga</h2>

<input id="origemCidade" placeholder="Cidade origem">

<input id="origemEstado" placeholder="Estado origem (SP)">

<input id="destinoCidade" placeholder="Cidade destino">

<input id="destinoEstado" placeholder="Estado destino (PR)">

<input id="toneladas" placeholder="Peso da carga (toneladas)">

<input id="valor" placeholder="Valor do frete">

<select id="tipoFrete">

<option value="tonelada">Frete por tonelada</option>

<option value="fechado">Frete fechado</option>

</select>

<button onclick="publicarCarga()">
Publicar carga
</button>

</div>


<h2>Cargas disponíveis</h2>

<div id="listaCargas"></div>

</div>


<script>

async function publicarCarga(){

const origemCidade = document.getElementById("origemCidade").value.toUpperCase()

const origemEstado = document.getElementById("origemEstado").value.toUpperCase()

const destinoCidade = document.getElementById("destinoCidade").value.toUpperCase()

const destinoEstado = document.getElementById("destinoEstado").value.toUpperCase()

const toneladas = document.getElementById("toneladas").value

const valor = document.getElementById("valor").value

const tipo_frete = document.getElementById("tipoFrete").value

console.log(toneladas, valor, tipo_frete)


await fetch("https://cargora-backend.onrender.com/cargas",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

origem_estado: origemEstado,
origem_cidade: origemCidade,

destino_estado: destinoEstado,
destino_cidade: destinoCidade,

toneladas,
valor,
tipo_frete

})

})

carregarCargas()

}


async function carregarCargas(){

const resposta = await fetch("https://cargora-backend.onrender.com/cargas")

const cargas = await resposta.json()

const lista = document.getElementById("listaCargas")

lista.innerHTML=""

cargas.forEach(carga=>{

const card = document.createElement("div")

card.className="card"

card.innerHTML=`

<b>${carga.origem_cidade} - ${carga.origem_estado}
→
${carga.destino_cidade} - ${carga.destino_estado}</b>

<br>

${carga.toneladas || "-"} toneladas

<br>

<span class="valor">

R$ ${carga.valor || "0"}

</span>

<br>

${carga.tipo_frete === "tonelada" ? "POR TONELADA" : "FRETE FECHADO"}

`

lista.appendChild(card)

})

}


carregarCargas()

</script>

</body>

</html>
