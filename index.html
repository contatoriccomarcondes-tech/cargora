<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Cargora</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#0f172a;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:18px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

input{
padding:10px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
}

button{
padding:10px 15px;
border:none;
background:#0a7cff;
color:white;
border-radius:6px;
cursor:pointer;
}

.valor{
font-size:20px;
color:#2563eb;
font-weight:bold;
}

.status{
color:green;
font-weight:bold;
}

.rota{
font-size:18px;
margin-bottom:8px;
}

.filtros{
margin-bottom:20px;
display:flex;
gap:10px;
}

</style>

</head>

<body>

<header>
🚛 Cargora
</header>

<div class="container">

<h2>Publicar carga</h2>

<div class="card">

<input id="origem_estado" placeholder="Estado origem">
<input id="origem_cidade" placeholder="Cidade origem">

<input id="destino_estado" placeholder="Estado destino">
<input id="destino_cidade" placeholder="Cidade destino">

<input id="valor" placeholder="Valor do frete">

<button onclick="publicarCarga()">Publicar carga</button>

</div>

<h2>Cargas disponíveis</h2>

<div class="filtros">

<input id="origem" placeholder="Filtrar origem">
<input id="destino" placeholder="Filtrar destino">

<button onclick="filtrar()">Buscar</button>

</div>

<div id="cargas"></div>

</div>

<script>

let todasCargas = []

async function carregarCargas(){

const resposta = await fetch("https://cargora-backend.onrender.com/cargas")

const cargas = await resposta.json()

todasCargas = cargas

mostrarCargas(cargas)

}

function mostrarCargas(cargas){

const container = document.getElementById("cargas")

container.innerHTML=""

cargas.forEach(carga => {

const card = document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="rota">
${carga.origem_estado} - ${carga.origem_cidade} → ${carga.destino_estado} - ${carga.destino_cidade}
</div>

<div class="valor">
R$ ${carga.valor}
</div>

<div class="status">
Status: ${carga.status}
</div>

`

container.appendChild(card)

})

}

function filtrar(){

const origem = document.getElementById("origem").value.toLowerCase()
const destino = document.getElementById("destino").value.toLowerCase()

const filtradas = todasCargas.filter(carga =>

carga.origem_cidade.toLowerCase().includes(origem) &&
carga.destino_cidade.toLowerCase().includes(destino)

)

mostrarCargas(filtradas)

}

async function publicarCarga(){

const carga = {

origem_estado: document.getElementById("origem_estado").value,
origem_cidade: document.getElementById("origem_cidade").value,
destino_estado: document.getElementById("destino_estado").value,
destino_cidade: document.getElementById("destino_cidade").value,
valor: Number(document.getElementById("valor").value)

}

await fetch("https://cargora-backend.onrender.com/cargas", {

method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(carga)

})

carregarCargas()

}

carregarCargas()

</script>

</body>
</html>
