<script>

const API = "https://cargora-backend-1.onrender.com"

function distanciaFake(){
return Math.floor(Math.random()*800)+50
}

async function publicarCarga(){

const origemCidade = document.getElementById("origemCidade").value.toUpperCase().trim()
const origemEstado = document.getElementById("origemEstado").value.toUpperCase().trim()

const destinoCidade = document.getElementById("destinoCidade").value.toUpperCase().trim()
const destinoEstado = document.getElementById("destinoEstado").value.toUpperCase().trim()

const toneladasInput = document.getElementById("toneladas").value
const valorInput = document.getElementById("valor").value

const tipoFrete = document.getElementById("tipoFrete").value

if(
!origemCidade ||
!origemEstado ||
!destinoCidade ||
!destinoEstado ||
!toneladasInput ||
!valorInput
){
alert("Preencha todos os campos")
return
}

const toneladas = Number(toneladasInput)
const valor = Number(valorInput)

try{

await fetch(`${API}/cargas`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

origem_estado: origemEstado,
origem_cidade: origemCidade,
destino_estado: destinoEstado,
destino_cidade: destinoCidade,
toneladas: toneladas,
valor: valor,
tipo_frete: tipoFrete

})

})

carregarCargas()

}catch(err){

console.error(err)
alert("Erro ao publicar carga")

}

}

async function carregarCargas(){

const res = await fetch(`${API}/cargas`)
const cargas = await res.json()

const lista = document.getElementById("listaCargas")

lista.innerHTML=""

cargas.forEach(c=>{

const tipo = c.tipo_frete==="tonelada"
? "POR TONELADA"
: "FRETE FECHADO"

lista.innerHTML += `

<div class="card">

<div class="rota">
📦 ${c.origem_cidade} - ${c.origem_estado} → ${c.destino_cidade} - ${c.destino_estado}
</div>

<div class="info">
📏 ${distanciaFake()} km aprox
</div>

<div class="info">
🚚 ${c.toneladas} toneladas
</div>

<div class="info">
💰 R$ ${c.valor}
</div>

<div class="info">
${tipo}
</div>

<button class="interesse">
Tenho interesse
</button>

</div>

`

})

}

carregarCargas()

</script>
