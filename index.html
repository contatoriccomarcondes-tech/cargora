<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cargora</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

.form{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
border:none;
background:#0b5cff;
color:white;
border-radius:5px;
cursor:pointer;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.rota{
font-weight:bold;
font-size:16px;
margin-bottom:8px;
}

.info{
margin-bottom:5px;
}

.interesse{
margin-top:10px;
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>CARGORA</h1>

<div class="form">

<h3>Publicar carga</h3>

<input id="origemCidade" placeholder="Cidade origem">
<input id="origemEstado" placeholder="Estado origem">

<input id="destinoCidade" placeholder="Cidade destino">
<input id="destinoEstado" placeholder="Estado destino">

<input id="toneladas" type="Number" placeholder="Toneladas">

<input id="valor" type="Number" placeholder="Valor frete">

<select id="tipoFrete">
<option value="tonelada">Frete por tonelada</option>
<option value="fechado">Frete fechado</option>
</select>

<button onclick="publicarCarga()">Publicar carga</button>

</div>

<div id="listaCargas"></div>

</div>

<script>

const API = "https://cargora-backend-1.onrender.com"

function distanciaFake(){
return Math.floor(Math.random()*800)+50
}

async function publicarCarga(){

const origemCidade = document.getElementById("origemCidade").value.toUpperCase().trim()
const origemEstado = document.getElementById("origemEstado").value.toUpperCase().trim()

const destinoCidade = document.getElementById("destinoCidade").value.toUpperCase().trim()
const destinoEstado = document.getElementById("destinoEstado").value.toUpperCase().trim()

const toneladasInput = document.getElementById("toneladas").value
const valorInput = document.getElementById("valor").value

const tipoFrete = document.getElementById("tipoFrete").value

// validação correta
if(
origemCidade === "" ||
origemEstado === "" ||
destinoCidade === "" ||
destinoEstado === "" ||
toneladasInput === "" ||
valorInput === ""
){
alert("Preencha todos os campos")
return
}

const toneladas = Number(toneladasInput)
const valor = Number(valorInput)

try{

await fetch(`${API}/cargas`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

origem_estado: origemEstado,
origem_cidade: origemCidade,
destino_estado: destinoEstado,
destino_cidade: destinoCidade,
toneladas: toneladas,
valor: valor,
tipo_frete: tipoFrete

})

})

carregarCargas()

}catch(err){

console.error("Erro ao enviar carga", err)

alert("Erro ao publicar carga")

}

}

carregarCargas()

}

async function carregarCargas(){

const res=await fetch(`${API}/cargas`)

const cargas=await res.json()

const lista=document.getElementById("listaCargas")

lista.innerHTML=""

cargas.reverse().forEach(c=>{

const tipo=c.tipo_frete==="tonelada"?"POR TONELADA":"FRETE FECHADO"

lista.innerHTML+=`

<div class="card">

<div class="rota">

📦 ${c.origem_cidade} - ${c.origem_estado} → ${c.destino_cidade} - ${c.destino_estado}

</div>

<div class="info">

📏 ${distanciaFake()} km aprox

</div>

<div class="info">

🚚 ${c.toneladas} toneladas

</div>

<div class="info">

💰 R$ ${c.valor}

</div>

<div class="info">

${tipo}

</div>

<button class="interesse">

Tenho interesse

</button>

</div>

`

})

}

carregarCargas()

</script>

</body>

</html>
