<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Cargora</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0c1c3c;
color:white;
padding:15px;
font-size:20px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#2f6fed;
color:white;
border:none;
cursor:pointer;
}

.valor{
color:#2f6fed;
font-size:20px;
font-weight:bold;
}

</style>

</head>


<body>

<header>
🚛 Cargora
</header>


<div class="container">

<div class="card">

<h2>Publicar carga</h2>

<input id="origemCidade" placeholder="Cidade origem">
<input id="origemEstado" placeholder="Estado origem (SP)">

<input id="destinoCidade" placeholder="Cidade destino">
<input id="destinoEstado" placeholder="Estado destino (PR)">

<input id="peso" placeholder="Peso da carga (toneladas)">

<input id="valor" placeholder="Valor do frete">

<select id="tipoFrete">
<option value="tonelada">Frete por tonelada</option>
<option value="fechado">Frete fechado</option>
</select>

<button onclick="publicarCarga()">Publicar carga</button>

</div>


<h2>Cargas disponíveis</h2>

<div id="lista"></div>

</div>



<script>

const API="https://cargora-backend.onrender.com"



function formatarMoeda(valor){

return valor.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
})

}



async function carregarCargas(){

const res=await fetch(API+"/cargas")

const cargas=await res.json()

const lista=document.getElementById("lista")

lista.innerHTML=""

cargas.forEach(c=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div style="font-weight:bold">
${c.origem_cidade} - ${c.origem_estado} → ${c.destino_cidade} - ${c.destino_estado}
</div>

<div style="color:#666">
${c.distancia?c.distancia+" km aprox":""}
</div>

<div>
${c.toneladas?c.toneladas+" toneladas":""}
</div>

<div class="valor">
${c.valor?formatarMoeda(c.valor):""}
</div>

<div>
${c.tipo_frete==="tonelada"?"POR TONELADA":"FRETE FECHADO"}
</div>

`

lista.appendChild(card)

})

}



async function publicarCarga(){

const origemCidade=document.getElementById("origemCidade").value.toUpperCase()
const origemEstado=document.getElementById("origemEstado").value.toUpperCase()

const destinoCidade=document.getElementById("destinoCidade").value.toUpperCase()
const destinoEstado=document.getElementById("destinoEstado").value.toUpperCase()

const toneladas=Number(document.getElementById("peso").value)

let valorTexto=document.getElementById("valor").value

valorTexto=valorTexto
.replace("R$","")
.replace(".","")
.replace(",",".")
.trim()

const valor=Number(valorTexto)

const tipo_frete=document.getElementById("tipoFrete").value



await fetch(API+"/cargas",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

origem_estado:origemEstado,
origem_cidade:origemCidade,

destino_estado:destinoEstado,
destino_cidade:destinoCidade,

toneladas,
valor,
tipo_frete

})

})



carregarCargas()

}



carregarCargas()

</script>


</body>
</html>
